kind = "web"
previewPath = "/"
title = "Hotel de João"
version = "1.0.0"
id = "artifacts/hotel-dedejoao"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20436

[services.development]
run = "pnpm --filter @workspace/hotel-dedejoao run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hotel-dedejoao", "run", "build" ]
publicDir = "artifacts/hotel-dedejoao/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20436"
BASE_PATH = "/"
